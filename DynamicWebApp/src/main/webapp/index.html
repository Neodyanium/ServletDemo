<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body bgcolor="#fffaf0">
    <form action="./formServlet" method="post">
        <h2>User Registration</h2>
        <div>
        <label for="username"> Username </label>
        <input id="username" name="username" type="text" required placeholder="Arun Shetty">
        </div>
        <br>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="kUchBhid@@ldE">
        </div>
        <br>
        <div>
            <input type="submit" style="background-color:lime" ></input>
        </div>
    </form>
</body>
</html>
